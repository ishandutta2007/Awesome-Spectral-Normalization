<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="40%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>
    
    <!-- Accent Gradient 1 -->
    <linearGradient id="accentGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.3" />
    </linearGradient>

    <!-- Glowing Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="1200" height="400" fill="url(#bgGrad)" />

  <!-- Grid Pattern representing stability/regularization -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" />
  </g>

  <!-- Waveform curves representing singular values (Spectral Norm concept) -->
  <!-- Wave 1 (Wide low-frequency representing smooth landscape) -->
  <path d="M 0,280 Q 300,120 600,220 T 1200,140" fill="none" stroke="url(#accentGrad1)" stroke-width="6" filter="url(#glow)" />
  
  <!-- Wave 2 (Higher frequency, Lipschitz constrained) -->
  <path d="M 0,200 C 200,320 400,80 600,200 C 800,320 1000,80 1200,200" fill="none" stroke="#6366f1" stroke-opacity="0.4" stroke-width="3" />
  
  <!-- Wave 3 (Mathematical boundary limit line) -->
  <path d="M 0,200 L 1200,200" fill="none" stroke="#f43f5e" stroke-dasharray="10 15" stroke-opacity="0.5" stroke-width="2" />
  <text x="1100" y="190" fill="#f43f5e" font-family="'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="bold" fill-opacity="0.7">LIPSCHITZ BOUND (L=1)</text>

  <!-- Graphic Elements: Nodes / Eigenvalues -->
  <circle cx="300" cy="200" r="8" fill="#38bdf8" filter="url(#glow)" />
  <circle cx="600" cy="200" r="10" fill="#c084fc" filter="url(#glow)" />
  <circle cx="900" cy="200" r="8" fill="#fb7185" filter="url(#glow)" />

  <!-- Main Banner Text -->
  <g transform="translate(600, 160)" text-anchor="middle">
    <!-- Awesome Title -->
    <text y="-30" fill="url(#textGrad)" font-family="'Outfit', 'Inter', 'Segoe UI', sans-serif" font-size="56" font-weight="900" letter-spacing="4" filter="url(#glow)">
      AWESOME SPECTRAL NORMALIZATION
    </text>
    
    <!-- Subtitle -->
    <text y="30" fill="#94a3b8" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="500" letter-spacing="2">
      Evolution • Variants • Optimization • Applications
    </text>
  </g>

  <!-- Floating Mathematical Symbols -->
  <text x="150" y="90" fill="#38bdf8" fill-opacity="0.15" font-family="Consolas, monospace" font-size="36" font-weight="bold">σ(W) = 1</text>
  <text x="950" y="320" fill="#fb7185" fill-opacity="0.15" font-family="Consolas, monospace" font-size="36" font-weight="bold">||f||_Lip ≤ 1</text>
  <text x="100" y="310" fill="#a855f7" fill-opacity="0.15" font-family="Consolas, monospace" font-size="28" font-weight="bold">u^T W v</text>
  <text x="1000" y="100" fill="#6366f1" fill-opacity="0.15" font-family="Consolas, monospace" font-size="28" font-weight="bold">W/σ(W)</text>
</svg>
